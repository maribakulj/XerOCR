# Glossaire pédagogique du rapport — français.
#
# Définitions destinées au lecteur non-expert, affichées en fin de rapport
# pour les seules métriques effectivement calculées par le moteur. DONNÉE
# (≠ surface exécutable) : on n'ajoute une entrée que pour une métrique qui a
# un consommateur réel (un détecteur/un score dans le RunResult).
#
# Champs par entrée :
#   title       : titre court (affiché dans le résumé dépliable)
#   definition  : 2-3 phrases de définition formelle
#   measures    : ce que la métrique mesure concrètement
#   limits      : limites connues, pièges fréquents

cer:
  title: "CER — taux d'erreur caractère"
  definition: >-
    Rapport entre la distance d'édition (substitutions + insertions +
    suppressions) au niveau caractère et la longueur de la référence,
    exprimé en proportion. 0 = transcription parfaite.
  measures: >-
    La fidélité caractère-à-caractère entre la sortie du moteur et la
    vérité terrain, après le profil de normalisation choisi.
  limits: >-
    Insensible au sens des erreurs : une faute sur un caractère rare pèse
    autant qu'une faute courante. Dépend du profil de normalisation appliqué.

cer_diplo:
  title: "CER diplomatique"
  definition: >-
    CER calculé sans aucune normalisation graphique : les variantes
    historiques (s long ſ, u/v, ligatures) sont comptées comme distinctes.
  measures: >-
    La fidélité à la graphie exacte du témoin, telle qu'attendue dans une
    édition diplomatique de document patrimonial.
  limits: >-
    Plus sévère que le CER normalisé ; à ne comparer qu'entre moteurs
    évalués sur la même vérité terrain diplomatique.

wer:
  title: "WER — taux d'erreur mot"
  definition: >-
    Équivalent du CER au niveau du mot : distance d'édition entre les
    suites de mots de l'hypothèse et de la référence, rapportée au nombre
    de mots de référence.
  measures: >-
    La fidélité mot-à-mot ; un mot est faux dès qu'un seul de ses
    caractères diffère.
  limits: >-
    Très sensible à la segmentation en mots et à la ponctuation collée ;
    un WER élevé peut masquer un CER faible.

mer:
  title: "MER — match error rate"
  definition: >-
    Rapport entre le nombre d'opérations d'édition et la longueur de
    l'alignement (référence + insertions), borné entre 0 et 1.
  measures: >-
    La part de l'alignement caractère qui n'est pas une correspondance
    exacte ; variante bornée du CER.
  limits: >-
    Proche du CER sur texte propre ; diverge surtout en présence de longues
    insertions/suppressions.

cmer:
  title: "cMER — match error rate caractère (HIPE)"
  definition: >-
    Match Error Rate au niveau caractère — (S+D+I)/(H+S+D+I) —, borné entre
    0 et 1. C'est la métrique de classement du benchmark HIPE-OCRepair,
    calculée sous le profil de normalisation du scorer officiel.
  measures: >-
    La part de l'alignement caractère qui n'est pas une correspondance
    exacte. Contrairement au CER (rapporté à la seule référence), il reste
    comparable même quand un modèle génératif rallonge le texte (CER > 100 %).
  limits: >-
    Dépend du profil de normalisation : le profil « hipe » plie casse,
    ponctuation et certaines formes patrimoniales (œ/oe, æ/ae) — comparer les
    vues hipe/heritage pour isoler cet effet.

del_rate:
  title: "Taux de suppressions"
  definition: >-
    Part des caractères de la référence absents de l'hypothèse, rapportée à
    la longueur de référence.
  measures: >-
    La tendance du moteur à « oublier » du texte (sous-transcription).
  limits: >-
    Composante d'erreur seule : à lire avec le taux d'insertions pour
    diagnostiquer un déséquilibre.

ins_rate:
  title: "Taux d'insertions"
  definition: >-
    Part de caractères présents dans l'hypothèse sans correspondant dans la
    référence, rapportée à la longueur de référence.
  measures: >-
    La tendance du moteur à « inventer » du texte (sur-transcription,
    parfois signe d'hallucination LLM).
  limits: >-
    Composante d'erreur seule ; un taux élevé isolé oriente vers du bruit
    ou une hallucination plutôt qu'une mauvaise lecture.

diacritic_err:
  title: "Erreur sur les diacritiques"
  definition: >-
    Taux d'erreur restreint aux signes diacritiques (accents, cédilles,
    brèves…) après isolement de la couche diacritique du texte.
  measures: >-
    La fidélité du moteur à l'accentuation, souvent perdue par les OCR
    entraînés sur du texte moderne.
  limits: >-
    Non applicable aux écritures sans diacritiques ; dépend de la
    normalisation Unicode appliquée à la référence.

mufi_err:
  title: "Erreur MUFI (caractères médiévaux)"
  definition: >-
    Taux d'erreur restreint aux caractères de la Medieval Unicode Font
    Initiative (abréviations, lettres rares) présents dans la référence.
  measures: >-
    La capacité du moteur à restituer les caractères spécialisés des
    écritures médiévales.
  limits: >-
    Non applicable si la vérité terrain ne contient aucun caractère MUFI.

hallucination:
  title: "Indice d'hallucination"
  definition: >-
    Signal dérivé du surplus de texte produit sans appui dans la référence
    (insertions massives, répétitions), typique d'un LLM qui « comble ».
  measures: >-
    Le risque que la sortie contienne du texte plausible mais inventé,
    absent du document source.
  limits: >-
    Indicateur, pas une preuve : une insertion légitime (texte réellement
    présent mais hors GT) peut le faire monter.

searchability:
  title: "Indice de recherchabilité"
  definition: >-
    Estimation de la part du texte qui resterait retrouvable par une
    recherche plein-texte malgré les erreurs de transcription.
  measures: >-
    L'utilité pratique de la sortie pour l'indexation et la recherche,
    au-delà du CER brut.
  limits: >-
    Heuristique d'usage : ne remplace pas une évaluation de rappel sur des
    requêtes réelles.

region_cer:
  title: "CER par région"
  definition: >-
    CER agrégé au niveau d'une région de mise en page (bloc, colonne),
    quand la segmentation fournit un découpage.
  measures: >-
    La qualité de transcription localisée, pour repérer les zones d'une
    page où le moteur décroche.
  limits: >-
    Dépend de la qualité de la segmentation amont ; non applicable sans
    couche structurelle.

region_detection:
  title: "Détection de régions"
  definition: >-
    Mesure de recouvrement entre les régions détectées par la segmentation
    et les régions de la vérité terrain de mise en page.
  measures: >-
    La justesse de la segmentation (a-t-on trouvé les bons blocs, au bon
    endroit) indépendamment du texte.
  limits: >-
    Non applicable sans vérité terrain de mise en page ; sensible au seuil
    de recouvrement choisi.

significance_p:
  title: "p-valeur (test statistique)"
  definition: >-
    Probabilité d'observer un écart au moins aussi grand entre deux moteurs
    si, en réalité, ils étaient équivalents (hypothèse nulle).
  measures: >-
    Le degré de surprise d'un écart de performance ; une p-valeur basse
    (< 0,05) indique un écart peu attribuable au hasard.
  limits: >-
    Ne mesure ni l'ampleur ni l'importance pratique de l'écart ; sensible à
    la taille du corpus et exige une correction en comparaisons multiples.

ece:
  title: "ECE — erreur de calibration attendue"
  definition: >-
    Écart moyen, pondéré par le nombre de jetons, entre la confiance
    annoncée par le moteur et son exactitude réellement observée.
  measures: >-
    À quel point les scores de confiance d'un moteur sont fiables : un
    moteur bien calibré a raison à hauteur de ce qu'il annonce.
  limits: >-
    Non applicable aux moteurs sans score de confiance ; dépend du
    découpage en bins de confiance.

mce:
  title: "MCE — erreur de calibration maximale"
  definition: >-
    Plus grand écart, sur l'ensemble des bins de confiance, entre confiance
    annoncée et exactitude observée.
  measures: >-
    Le pire cas de sur- ou sous-confiance d'un moteur, là où l'ECE n'en
    donne que la moyenne.
  limits: >-
    Sensible aux bins peu peuplés ; à lire conjointement avec l'ECE.
