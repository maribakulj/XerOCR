<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>XerOCR — refonte rapport benchmark</title>
<link rel="stylesheet" href="tokens.css" />
<style>
  html, body {
    margin: 0;
    background: #1f1e1c;
    font-family: 'IBM Plex Sans', system-ui, sans-serif;
    color: #e4e0d7;
    min-height: 100vh;
  }
  .design-canvas {
    background: #1f1e1c !important;
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="view-synthesis.jsx"></script>
<script type="text/babel" src="view-by-engine.jsx"></script>
<script type="text/babel" src="view-by-document.jsx"></script>
<script type="text/babel" src="view-crosses.jsx"></script>
<script type="text/babel" src="chrome.jsx"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { DesignCanvas, DCSection, DCArtboard, ReportApp } = window;

    function App() {
      return (
        <DesignCanvas
          title="XerOCR · refonte des rapports de benchmark"
          subtitle="prototype interactif — chaque artboard est une entrée navigable. Cliquer les onglets, les en-têtes de tableau, et les lignes pour drill-in."
        >
          <DCSection id="entry-overview" title="01 · Entrée Vue d'ensemble">
            <DCArtboard id="entry-overview" label="Entrée · Vue d'ensemble" width={1280} height={1480}>
              <ReportApp initialTab="overview" />
            </DCArtboard>
          </DCSection>

          <DCSection id="entries-engines" title="02 · Par moteur — galerie / drill-in (symétrique à Par document)">
            <DCArtboard id="entry-engines-overview"
                        label="Par moteur · tableau d'aperçu (état par défaut)"
                        width={1280} height={1820}>
              <ReportApp initialTab="engines" />
            </DCArtboard>
            <DCArtboard id="entry-engines-detail"
                        label="Par moteur · profil ouvert (Mistral OCR sélectionné)"
                        width={1280} height={1980}>
              <ReportApp initialTab="engines" initialSelectedEngine={2} />
            </DCArtboard>
          </DCSection>

          <DCSection id="entries-documents" title="03 · Par document — galerie / drill-in">
            <DCArtboard id="entry-documents-gallery"
                        label="Par document · galerie (état par défaut)"
                        width={1280} height={1640}>
              <ReportApp initialTab="documents" />
            </DCArtboard>
            <DCArtboard id="entry-documents-drilled"
                        label="Par document · document ouvert"
                        width={1280} height={1620}>
              <ReportApp initialTab="documents" initialSelected={2} />
            </DCArtboard>
          </DCSection>

          <DCSection id="entry-crosses" title="04 · Croisements">
            <DCArtboard id="entry-crosses" label="Entrée · Croisements" width={1280} height={1640}>
              <ReportApp initialTab="crosses" />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
