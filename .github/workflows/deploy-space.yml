name: Deploy Space

# Synchronise la vitrine (lecture seule) vers un Hugging Face Space.
# - AUTO : à chaque push sur main (comme l'ancien sync-to-hub).
# - MANUEL : bouton "Run workflow" (permet de viser un autre Space).
# Le runner GitHub a l'accès réseau + le secret HF_TOKEN (write) du dépôt ;
# il assemble un dépôt « racine plate » et le pousse vers le Space.
"on":
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      space:
        description: "Space cible (owner/nom)"
        required: true
        default: "Ma-Ri-Ba-Ku/XerOCR"

# Un seul déploiement à la fois ; un push plus récent annule le précédent.
concurrency:
  group: deploy-space
  cancel-in-progress: true

env:
  # Space par défaut (push auto) ; l'input du déclenchement manuel le surcharge.
  DEFAULT_SPACE: "Ma-Ri-Ba-Ku/XerOCR"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 1) Smoke-test FIDÈLE : on lance le VRAI serveur (ce que fait le conteneur)
      #    et on le sonde avec curl. Aucune dépendance httpx/TestClient : on teste
      #    l'artefact déployé, pas un client de test absent de l'image.
      - name: Smoke-test de la vitrine servie
        run: |
          pip install -e ".[serve]"
          export XEROCR_REPORTS_DIR="$PWD/deploy/reports"
          python -m uvicorn xerocr.interfaces.web.app:create_app \
            --factory --host 127.0.0.1 --port 7861 &
          srv=$!
          ok=0
          for _ in $(seq 1 40); do
            curl -sf http://127.0.0.1:7861/health >/dev/null 2>&1 && { ok=1; break; }
            sleep 0.5
          done
          curl -s http://127.0.0.1:7861/api/reports
          code=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:7861/health)
          kill $srv 2>/dev/null || true
          test "$ok" = 1 && test "$code" = 200 || {
            echo "::error::la vitrine ne répond pas (ok=$ok code=$code)"; exit 1; }
          echo "smoke OK"

      # 2) Assembler le dépôt « racine plate » attendu par le Space.
      #    On déploie désormais l'image MOTEUR (Dockerfile.engine) : le Space public
      #    exécute un vrai Tesseract gratuit, plus seulement une vitrine lecture seule.
      - name: Assembler le contexte du Space
        run: |
          mkdir -p space/reports
          cp deploy/Dockerfile.engine space/Dockerfile
          cp deploy/requirements.txt space/requirements.txt
          cp deploy/README_SPACE.md  space/README.md
          cp pyproject.toml          space/pyproject.toml
          cp -r xerocr               space/xerocr
          cp deploy/reports/*.json space/reports/ 2>/dev/null || true
          touch space/reports/.gitkeep
          find space -name '__pycache__' -type d -prune -exec rm -rf {} +

      # 3) Construire l'image moteur (le smoke-test du BUILD échoue si Tesseract /
      #    la langue ``fra`` manquent, ou si l'OCR deadlock/timeoute — cf. Dockerfile).
      #    Le contexte plat n'a pas de .git → setuptools_scm retombe sur
      #    ``fallback_version`` (pyproject), comme l'image vitrine.
      - name: Build de l'image moteur (smoke build inclus)
        run: docker build -f space/Dockerfile -t xerocr-engine:ci space/

      # 4) Smoke OCR RÉEL : lancer le conteneur, vérifier /health, puis faire OCRiser
      #    une image de TEXTE réelle par le Tesseract baqué (≠ le damier du build).
      #    Le binaire reconnaît du vrai texte avec le modèle ``fra`` ou le déploiement
      #    est refusé. ImageMagick n'est plus préinstallé sur ubuntu-24.04 (le runner
      #    ``ubuntu-latest`` courant) → on l'installe explicitement (sinon ``convert``
      #    renvoie 127 et le déploiement échoue à tort).
      - name: Installer ImageMagick (rendu de l'image de smoke)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends imagemagick

      - name: Smoke OCR réel (Tesseract baqué)
        run: |
          set -euo pipefail
          docker run -d --name engine -p 7860:7860 xerocr-engine:ci
          ok=0
          for _ in $(seq 1 60); do
            curl -sf http://127.0.0.1:7860/health >/dev/null 2>&1 && { ok=1; break; }
            sleep 1
          done
          if [ "$ok" != 1 ]; then
            docker logs engine || true
            echo "::error::le conteneur moteur ne répond pas sur /health"; exit 1
          fi
          # Image de texte réelle → OCR via le binaire baqué (modèle fra).
          convert -size 360x90 xc:white -gravity center \
            -pointsize 48 -annotate 0 'Bonjour' /tmp/hello.png
          docker cp /tmp/hello.png engine:/tmp/hello.png
          out="$(docker exec engine tesseract /tmp/hello.png - -l fra --psm 7 2>/dev/null || true)"
          echo "OCR => [$out]"
          docker rm -f engine >/dev/null 2>&1 || true
          echo "$out" | grep -iq 'Bonjour' || {
            echo "::error::OCR réel échoué (texte 'Bonjour' non reconnu)"; exit 1; }
          echo "smoke OCR réel OK"

      # 5) Pousser vers le Space. Le token n'est JAMAIS imprimé (env + masquage).
      - name: Pousser vers le Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          SPACE_INPUT: ${{ github.event.inputs.space }}
        run: |
          # pipefail : sinon `git push | sed` masque l'échec (sortie = sed = 0)
          # et un push REJETÉ passerait pour un déploiement réussi (bug observé).
          set -o pipefail
          space="${SPACE_INPUT:-$DEFAULT_SPACE}"
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::secret HF_TOKEN absent du dépôt — déploiement impossible."
            exit 1
          fi
          owner="${space%%/*}"
          cd space
          git init -q
          # HuggingFace REFUSE les binaires en git ordinaire (politique Xet/LFS) :
          # on suit les fontes/images en **Git LFS**. Le build du Space résout les
          # fichiers LFS, donc les fontes restent servies normalement.
          git lfs install --local
          git lfs track "*.woff2" "*.woff" "*.otf" "*.ttf" "*.png" "*.jpg" "*.jpeg" "*.pdf"
          git config user.name  "xerocr-deploy"
          git config user.email "deploy@xerocr.local"
          git checkout -q -b main
          git add -A
          git commit -q -m "Déploiement de la vitrine XerOCR"
          set +x
          remote="https://${owner}:${HF_TOKEN}@huggingface.co/spaces/${space}"
          # HF renvoie parfois 429 (rate-limit) : retry avec backoff exponentiel
          # (15/30/60/120 s) plutôt qu'un échec au premier essai. pipefail actif :
          # le statut testé est bien celui du push, pas du sed de masquage.
          attempt=0
          until git push -f "$remote" main 2>&1 | sed "s/${HF_TOKEN}/***/g"; do
            attempt=$((attempt + 1))
            if [ "$attempt" -ge 5 ]; then
              echo "::error::push vers le Space refusé après 5 tentatives (HF 429 persistant ?)."
              exit 1
            fi
            wait=$((15 * 2 ** (attempt - 1)))
            echo "push refusé (tentative ${attempt}/5) — nouvel essai dans ${wait}s"
            sleep "$wait"
          done
          echo "Poussé vers https://huggingface.co/spaces/${space}"
