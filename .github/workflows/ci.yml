name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Lint + type + tests, sur la matrice OS × Python à forte valeur.
  # Windows/macOS exercent le code de chemins (validated_path, stem injectif,
  # workspaces) — exactement ce qui casse hors Linux. make absent sous Windows
  # → on appelle ruff/mypy/pytest directement (portable).
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check xerocr/ tests/
      - name: Type
        run: python -m mypy -p xerocr
      - name: Test
        run: python -m pytest -q

  # Construit l'image de la vitrine (ce que le sandbox ne pouvait pas vérifier)
  # et la sonde RÉELLEMENT : conteneur lancé → /health + /api/reports via curl.
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Préparer un rapport baké
        run: |
          mkdir -p deploy/reports
          # le .gitkeep suffit ; un rapport démo est déjà versionné dans deploy/reports.
      - name: Build de l'image
        run: docker build -f deploy/Dockerfile -t xerocr-vitrine:ci .
      - name: Lancer + sonder le conteneur
        run: |
          docker run -d --name vitrine -p 7860:7860 xerocr-vitrine:ci
          ok=0
          for _ in $(seq 1 40); do
            curl -sf http://127.0.0.1:7860/health >/dev/null 2>&1 && { ok=1; break; }
            sleep 1
          done
          curl -s http://127.0.0.1:7860/api/reports || true
          docker logs vitrine || true
          docker rm -f vitrine >/dev/null 2>&1 || true
          test "$ok" = 1 || { echo "::error::le conteneur ne répond pas sur /health"; exit 1; }
          echo "image OK"

  # Scan de vulnérabilités des dépendances (appli exposée au web).
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: pip-audit (deps de la vitrine)
        run: |
          pip install pip-audit
          # On audite les requirements de la vitrine (surface servie), pas l'env
          # système (qui contient des paquets hors-PyPI comme python-apt).
          pip-audit --strict -r deploy/requirements.txt
